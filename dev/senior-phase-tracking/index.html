<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senior Phase Tracking System — Development Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="spt-styles.css">
</head>
<body>
  <header class="dev-banner" role="banner">
    <div>
      <strong>Senior Phase Tracking System</strong>
      <p>Development preview — not connected to live Faculty Hub. Data stored locally in your browser.</p>
    </div>
    <div class="dev-banner-controls">
      <label for="dev-role">View as</label>
      <select id="dev-role" aria-label="Simulated role">
        <option value="faculty_head">Faculty Head / Admin</option>
        <option value="class_teacher">Class Teacher</option>
        <option value="read_only">Read Only / SLT</option>
      </select>
      <label for="dev-teacher">Teacher</label>
      <select id="dev-teacher" aria-label="Simulated teacher"></select>
    </div>
  </header>

  <div class="app-shell">
    <aside class="sidebar" aria-label="Development navigation">
      <div class="sidebar-brand">
        <div class="sidebar-brand-title">Senior Phase</div>
        <div class="sidebar-brand-sub">Faculty tracking workbook</div>
      </div>
      <div class="sidebar-title">Navigate</div>
      <button type="button" class="nav-btn active" data-route="dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        Dashboard
      </button>
      <button type="button" class="nav-btn" data-route="alerts" id="nav-alerts">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Alerts
      </button>
      <button type="button" class="nav-btn" data-route="setup" id="nav-setup">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        Setup / Cohort
      </button>
      <button type="button" class="nav-btn" data-route="courses">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19h16M6 17V7M10 17V4M14 17v-6M18 17V9"/></svg>
        Courses
      </button>
      <button type="button" class="nav-btn" data-route="evidence">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
        Evidence Bank
      </button>
      <button type="button" class="nav-btn" data-route="level-changes">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M7 7h10v10"/></svg>
        Level Changes
      </button>
      <button type="button" class="nav-btn" data-route="interventions">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Interventions
      </button>
      <button type="button" class="nav-btn" data-route="import">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        Import Tracking
      </button>
      <button type="button" class="nav-btn" data-route="reports">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        Reports
      </button>
      <div class="sidebar-footer">
        <button type="button" class="btn-reset" id="btn-reset-data">Reset development data</button>
      </div>
    </aside>
    <main class="main" id="app-main" role="main"></main>
  </div>

  <div class="drawer-backdrop" id="drawer-backdrop" aria-hidden="true"></div>
  <aside class="drawer" id="pupil-drawer" aria-label="Pupil profile">
    <div class="drawer-head">
      <div>
        <h2 id="drawer-title">Pupil profile</h2>
        <p id="drawer-sub" class="drawer-sub"></p>
      </div>
      <button type="button" class="drawer-close" id="drawer-close" aria-label="Close">&times;</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </aside>

  <div class="modal-backdrop" id="modal-backdrop" hidden></div>
  <div class="modal" id="app-modal" role="dialog" aria-modal="true" hidden>
    <div class="modal-head">
      <h2 id="modal-title">Dialog</h2>
      <button type="button" class="drawer-close" id="modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>

  <script src="spt-config.js"></script>
  <script src="spt-seed.js"></script>
  <script src="spt-risk.js"></script>
  <script src="spt-prelim.js"></script>
  <script src="spt-concerns.js"></script>
  <script src="spt-store.js"></script>
  <script src="spt-import.js"></script>
  <script src="spt-reports.js"></script>
  <script src="spt-app.js"></script>
</body>
</html>
