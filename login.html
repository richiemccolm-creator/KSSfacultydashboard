<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Faculty Hub">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="apple-touch-icon" href="faculty-hub-logo.png" sizes="180x180">
<link rel="icon" type="image/png" href="faculty-hub-logo.png">
<title>Sign In — Expressive Arts Faculty</title>
<script src="app-version.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#16243c,#1e2d4a);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;-webkit-font-smoothing:antialiased}
.login-card{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.25);width:100%;max-width:400px;padding:2.5rem}
.login-logo-wrap{text-align:center;margin-bottom:1rem}
.login-logo-img{display:inline-block;max-width:180px;height:auto}
.login-sub{font-size:.75rem;color:#718096;text-align:center;margin-bottom:1.75rem}
.login-form{display:flex;flex-direction:column;gap:1rem}
.form-group{display:flex;flex-direction:column;gap:.35rem}
.form-label{font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#4a5568}
.form-input{font-size:.9rem;padding:.65rem .9rem;border:1px solid #e2e8f0;border-radius:8px;transition:border-color .15s}
.form-input:focus{outline:none;border-color:#4a7fd4;box-shadow:0 0 0 3px rgba(74,127,212,.15)}
.form-input::placeholder{color:#a0aec0}
.btn{font-size:.88rem;font-weight:600;padding:.75rem 1.25rem;border-radius:8px;border:none;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:.5rem}
.btn-primary{background:#4a7fd4;color:#fff}
.btn-primary:hover{background:#3a6fc4}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-oauth{background:#f7fafc;color:#1a202c;border:1px solid #e2e8f0}
.btn-oauth:hover{background:#edf2f7;border-color:#cbd5e0}
.divider{display:flex;align-items:center;gap:1rem;margin:.5rem 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e2e8f0}
.divider span{font-size:.7rem;color:#718096;text-transform:uppercase;letter-spacing:.1em}
.err-msg{font-size:.8rem;color:#c53030;background:#fff5f5;padding:.6rem .9rem;border-radius:6px;border:1px solid #feb2b2;display:none}
.err-msg.show{display:block}
.links{text-align:center;margin-top:1.25rem;font-size:.8rem}
.links a{color:#4a7fd4;text-decoration:none}
.links a:hover{text-decoration:underline}
.privacy-link{margin-top:1rem;font-size:.72rem;color:#718096}
.privacy-link a{color:#4a7fd4}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo-wrap">
    <img src="faculty-hub-logo.png" alt="Faculty Hub" class="login-logo-img">
  </div>
  <p class="login-sub">Knightswood Secondary School</p>
  <div id="errMsg" class="err-msg"></div>
  <div id="alreadySignedIn" class="err-msg" style="background:#e6fffa;border-color:#81e6d9;color:#234e52;display:none">
    You're already signed in. <a href="#" id="continueLink" style="font-weight:600">Continue to app</a> or <a href="login.html?signout=1" style="font-weight:600">sign out</a> to use a different account.
  </div>
  <form id="loginForm" class="login-form">
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input type="email" id="email" class="form-input" placeholder="you@school.org" required autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary" id="submitBtn">Sign in</button>
  </form>
  <p class="privacy-link"><a href="privacy.html">Privacy Policy</a> · GDPR compliant</p>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js"></script>
<script src="allowlist-check.js"></script>
<script>
(function() {
  var withVersion = window.withAppVersion || function(url){ return url; };
  if (window.ensureAppVersionInUrl && window.ensureAppVersionInUrl()) return;

  if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY || window.SUPABASE_URL.includes('your-project')) {
    document.getElementById('errMsg').textContent = 'Supabase not configured. Update config.js with your project URL and anon key.';
    document.getElementById('errMsg').classList.add('show');
    return;
  }
  var sb = window.supabase;
  if (sb && typeof sb.createClient === 'function') {
    window.supabase = sb.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  }
  var supabase = window.supabase;
  if (!supabase || !supabase.auth) {
    document.getElementById('errMsg').textContent = 'Supabase client not loaded. Check config.js and script order.';
    document.getElementById('errMsg').classList.add('show');
    return;
  }

  function showErr(msg) {
    var el = document.getElementById('errMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideErr() {
    document.getElementById('errMsg').classList.remove('show');
  }
  function setLoading(loading) {
    document.getElementById('submitBtn').disabled = loading;
    document.getElementById('submitBtn').textContent = loading ? 'Signing in…' : 'Sign in';
  }

  var redirect = new URLSearchParams(window.location.search).get('redirect') || 'faculty-hub.html';
  if (redirect.startsWith('/')) redirect = redirect.slice(1);

  function goToApp() {
    window.location.replace(withVersion(redirect || 'faculty-hub.html'));
  }

  function checkAndGo() {
    if (typeof window.checkAllowlist !== 'function') {
      goToApp();
      return;
    }
    window.checkAllowlist().then(function(r) {
      if (r.allowed) {
        goToApp();
      } else {
        supabase.auth.signOut();
        showErr('You do not have access to this system. Contact your administrator.');
      }
    });
  }

  if (new URLSearchParams(window.location.search).get('error') === 'access_denied') {
    showErr('You do not have access to this system. Contact your administrator.');
  }

  function checkSession() {
    supabase.auth.getSession().then(function(r) {
      if (r.data.session) {
        document.getElementById('alreadySignedIn').style.display = 'block';
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('continueLink').onclick = function(e) { e.preventDefault(); checkAndGo(); };
      }
    });
  }
  if (new URLSearchParams(window.location.search).get('signout') === '1') {
    supabase.auth.signOut().then(function() {
      if (window.clearSupabaseAuth) window.clearSupabaseAuth();
      window.location.replace(withVersion('login.html'));
    }).catch(function() {
      if (window.clearSupabaseAuth) window.clearSupabaseAuth();
      window.location.replace(withVersion('login.html'));
    });
  } else {
    checkSession();
  }

  document.getElementById('loginForm').onsubmit = function(e) {
    e.preventDefault();
    hideErr();
    setLoading(true);
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    supabase.auth.signInWithPassword({ email: email, password: password })
      .then(function(r) {
        setLoading(false);
        if (r.error) {
          showErr(r.error.message || 'Sign in failed');
          return;
        }
        checkAndGo();
      })
      .catch(function() {
        setLoading(false);
        showErr('Sign in failed. Please try again.');
      });
  };

})();
</script>
</body>
</html>
