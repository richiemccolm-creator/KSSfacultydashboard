<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIP Mission Tracker 25–26 — Art &amp; Drama</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dip-tracker-styles.css">
  <link rel="icon" type="image/png" href="faculty-hub-logo.png">
  <script>
    window.DIP_EMBED = new URLSearchParams(window.location.search).get('embed') === '1';
    if (window.DIP_EMBED) {
      document.documentElement.classList.add('dip-embed-pending');
      window.__authGuardLoginPath = 'login.html';
    }
  </script>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-init.js"></script>
  <script src="allowlist-check.js"></script>
  <script src="auth-guard.js"></script>
  <script src="dip-tracker-seed.js"></script>
  <script src="dip-tracker-service.js"></script>
</head>
<body>
  <header class="dip-header">
    <h1>Art &amp; Drama DIP Mission Tracker 2025–26</h1>
    <p class="dip-sub">Six mission sheets · grey fields from the improvement plan · collaborative evidence and term progress</p>
  </header>

  <div id="dip-mgmt-banner" class="dip-mgmt-banner"></div>

  <div class="dip-toolbar">
    <div class="dip-progress-wrap">
      <div class="dip-progress-label" id="dip-progress-label">Loading…</div>
      <div class="dip-progress-bar"><div class="dip-progress-fill" id="dip-progress-fill" style="width:0%"></div></div>
    </div>
    <span class="dip-sync-status" id="dip-sync-status"></span>
    <button type="button" class="dip-btn" id="dip-import-seed" title="Fill empty cells from v2 spreadsheet seed">Merge from seed</button>
    <button type="button" class="dip-btn" id="dip-save-now">Save now</button>
    <button type="button" class="dip-btn" id="dip-print">Print sheet</button>
  </div>

  <nav class="dip-tabs" id="dip-tabs" aria-label="Mission sheets"></nav>

  <main class="dip-main" id="dip-sheet-content"></main>

  <script src="dip-tracker-app.js"></script>
</body>
</html>
