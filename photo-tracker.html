<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#1e2d4a;
  --accent:#8b5cf6;
  --bg:#f0f2f5;
  --card:#fff;
  --border:#e2e8f0;
  --text:#1a202c;
  --text2:#4a5568;
  --text3:#718096;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;-webkit-font-smoothing:antialiased}
.wrap{max-width:520px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:2rem 2rem 1.75rem;text-align:center;box-shadow:0 4px 24px rgba(30,45,74,.06)}
.badge{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem}
h1{font-size:1.15rem;font-weight:700;color:var(--navy);margin-bottom:.5rem;line-height:1.3}
p{font-size:.85rem;color:var(--text2);line-height:1.65;margin-bottom:1.25rem}
a.btn{display:inline-flex;align-items:center;justify-content:center;padding:.55rem 1.1rem;border-radius:8px;background:var(--navy);color:#fff;text-decoration:none;font-size:.8rem;font-weight:600}
a.btn:hover{opacity:.94}
.muted{font-size:.75rem;color:var(--text3);margin-top:1rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">Photography · BGE</div>
  <h1>Photography tracker</h1>
  <p>This tracker is being built to match the Drama and Art &amp; Design BGE trackers. Until it is ready, use the Photography curriculum, assessment, and moderation areas in Faculty Hub.</p>
  <a class="btn" href="faculty-hub.html">← Back to Faculty Hub</a>
  <p class="muted">Opened from Planning &amp; assessment → Photography Tracker.</p>
</div>
</body>
</html>
