<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Announcements — Faculty Head</title>
<link rel="icon" type="image/png" href="faculty-hub-logo.png">
<script src="config.js"></script>
<script src="embed-chrome.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js"></script>
<script src="allowlist-check.js"></script>
<script src="auth-guard.js"></script>
<script src="fh-access.js"></script>
<script src="data-service.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-tokens.css">
<link rel="stylesheet" href="faculty-shell.css">
<link rel="stylesheet" href="fh-mobile-shell.css">
<style>
.top-home{padding:14px 18px 0;padding-top:calc(14px + env(safe-area-inset-top,0px))}
.top-home a{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;min-height:44px;border:1px solid var(--navy-100);border-radius:999px;text-decoration:none;color:var(--ink-700);font-size:var(--fs-sm);font-weight:600;background:#fff;-webkit-tap-highlight-color:transparent}
.ann-stack{margin:14px 18px 18px;margin-bottom:calc(18px + env(safe-area-inset-bottom,0px))}
.ann-stack{display:flex;flex-direction:column;gap:var(--sp-4)}
.ann-form-grid{display:grid;gap:var(--sp-3);grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.ann-field{display:flex;flex-direction:column;gap:var(--sp-1)}
.ann-field label{font-size:var(--fs-xs);font-weight:600;color:var(--ink-500);text-transform:uppercase;letter-spacing:.06em}
.ann-field input,.ann-field select,.ann-field textarea{width:100%;padding:10px;border:1px solid var(--navy-100);border-radius:var(--r-md);font:var(--fs-sm)/1.3 var(--font-sans)}
.ann-field textarea{min-height:96px;resize:vertical}
.ann-actions{display:flex;gap:var(--sp-2);flex-wrap:wrap}
.ann-toast{position:fixed;bottom:calc(var(--sp-6) + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:var(--ink-900);color:#fff;padding:var(--sp-3) var(--sp-5);border-radius:var(--r-pill);z-index:1000;display:none}
</style>
</head>
<body class="fh-mobile-page fh-hub-page">
  <section class="ann-stack">
    <div class="card">
      <h2 id="fhAnnFormTitle">New Announcement</h2>
      <p style="color:var(--ink-500);margin:6px 0 14px">Announcements appear on the Faculty Hub home page for staff.</p>
      <div class="ann-form-grid">
        <div class="ann-field" style="grid-column:span 2">
          <label for="fhAnnTitle">Title</label>
          <input id="fhAnnTitle" type="text" placeholder="e.g. Department Meeting Reminder">
        </div>
        <div class="ann-field">
          <label for="fhAnnExpires">Expires (optional)</label>
          <input id="fhAnnExpires" type="date">
        </div>
        <div class="ann-field">
          <label for="fhAnnPriority">Priority</label>
          <select id="fhAnnPriority">
            <option value="none">None</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>
      <div class="ann-field" style="margin-top:var(--sp-3)">
        <label for="fhAnnBody">Body</label>
        <textarea id="fhAnnBody" placeholder="Optional details..."></textarea>
      </div>
      <div style="margin:10px 0 14px">
        <label style="display:flex;align-items:center;gap:8px;font-size:var(--fs-sm);color:var(--ink-500)">
          <input id="fhAnnHighlight" type="checkbox">
          Shade full announcement with priority colour
        </label>
      </div>
      <div class="ann-actions">
        <button class="btn btn-primary" id="fhAnnCreateBtn" type="button">Add Announcement</button>
        <button class="btn" id="fhAnnUpdateBtn" type="button" style="display:none">Update Announcement</button>
        <button class="btn" id="fhAnnCancelBtn" type="button" style="display:none">Cancel Edit</button>
      </div>
      <p id="fhAnnSchemaHint" style="margin-top:10px;font-size:var(--fs-sm);color:#92400e;display:none"></p>
    </div>
    <div class="card">
      <h2>Announcements List</h2>
      <p style="color:var(--ink-500);margin:6px 0 14px">Manage active and scheduled announcements.</p>
      <div id="fhAnnList"></div>
    </div>
  </section>
<div id="fhToast" class="ann-toast"></div>
<script>
function fhShowToast(msg) {
  var t = document.getElementById('fhToast');
  if (!t) return;
  t.textContent = msg || '';
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 2500);
}
var fhAnnouncements = [];
var fhEditingAnnouncementId = null;

function fhEsc(v) {
  return String(v == null ? '' : v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function fhSubjectBadgeClass(subject) {
  var s = String(subject || '').toLowerCase();
  if (s.indexOf('drama') !== -1) return 'badge-drama';
  if (s.indexOf('photo') !== -1) return 'badge-photo';
  if (s.indexOf('art') !== -1) return 'badge-art';
  return '';
}
function fhSubjectBadge(subject) {
  var cls = fhSubjectBadgeClass(subject);
  if (!cls) return '';
  return ' <span class="badge ' + cls + '">' + fhEsc(subject) + '</span>';
}
function fhSubjectRowClass(subject) {
  var s = String(subject || '').toLowerCase();
  if (s.indexOf('drama') !== -1) return 'row-drama';
  if (s.indexOf('photo') !== -1) return 'row-photo';
  if (s.indexOf('art') !== -1) return 'row-art';
  return '';
}

function fhAnnouncementError(err, fallback) {
  return (err && (err.message || err.details || err.hint)) || fallback || 'Something went wrong';
}

function fhSetAnnouncementsSchemaHint() {
  var el = document.getElementById('fhAnnSchemaHint');
  if (!el || !window.DataService || typeof DataService.getAnnouncementsSchemaSupport !== 'function') return;
  DataService.getAnnouncementsSchemaSupport().then(function(info) {
    if (info && info.priorityColumns) {
      el.style.display = 'none';
      return;
    }
    el.style.display = 'block';
    el.textContent = 'Priority colour fields are unavailable on this database. Run the announcements priority migration to enable them.';
  }).catch(function() {
    el.style.display = 'block';
    el.textContent = 'Could not verify priority colour support. If colours do not apply, run the announcements priority migration.';
  });
}

function fhResetAnnouncementForm() {
  fhEditingAnnouncementId = null;
  document.getElementById('fhAnnFormTitle').textContent = 'New Announcement';
  document.getElementById('fhAnnTitle').value = '';
  document.getElementById('fhAnnBody').value = '';
  document.getElementById('fhAnnExpires').value = '';
  document.getElementById('fhAnnPriority').value = 'none';
  document.getElementById('fhAnnHighlight').checked = false;
  document.getElementById('fhAnnCreateBtn').style.display = 'inline-flex';
  document.getElementById('fhAnnUpdateBtn').style.display = 'none';
  document.getElementById('fhAnnCancelBtn').style.display = 'none';
}

function fhReadAnnouncementForm() {
  return {
    title: document.getElementById('fhAnnTitle').value.trim(),
    body: document.getElementById('fhAnnBody').value.trim() || null,
    expires_at: document.getElementById('fhAnnExpires').value || null,
    priority: document.getElementById('fhAnnPriority').value || 'none',
    highlight_priority: !!document.getElementById('fhAnnHighlight').checked
  };
}

function fhRenderAnnouncements() {
  var wrap = document.getElementById('fhAnnList');
  if (!wrap) return;
  if (!fhAnnouncements.length) {
    wrap.innerHTML = '<div class="empty-s">No announcements yet.</div>';
    return;
  }
  wrap.innerHTML = '<table class="table"><thead><tr><th>Title</th><th>Priority</th><th>Created</th><th>Expires</th><th></th></tr></thead><tbody>' +
    fhAnnouncements.map(function(a) {
      var p = String(a.priority || 'none');
      var pLabel = p.charAt(0).toUpperCase() + p.slice(1) + ((a.highlight_priority && p !== 'none') ? ' (shaded)' : '');
      var subject = String(a.subject || a.target_subject || a.targetSubject || '').trim();
      return '<tr class="' + fhSubjectRowClass(subject) + '">' +
        '<td>' + fhEsc(a.title) + fhSubjectBadge(subject) + '</td>' +
        '<td>' + fhEsc(pLabel) + '</td>' +
        '<td>' + fhEsc((a.created_at || '').slice(0, 10)) + '</td>' +
        '<td>' + fhEsc(a.expires_at || '—') + '</td>' +
        '<td><button class="btn" type="button" onclick="fhEditAnnouncement(\'' + fhEsc(a.id) + '\')">Edit</button> <button class="btn" type="button" onclick="fhDeleteAnnouncement(\'' + fhEsc(a.id) + '\')">Delete</button></td>' +
      '</tr>';
    }).join('') +
    '</tbody></table>';
}

function fhLoadAnnouncements() {
  if (!window.DataService || typeof DataService.getAnnouncements !== 'function') return;
  DataService.getAnnouncements().then(function(list) {
    fhAnnouncements = list || [];
    fhRenderAnnouncements();
  }).catch(function(err) {
    fhShowToast(fhAnnouncementError(err, 'Could not load announcements'));
  });
}

function fhEditAnnouncement(id) {
  var a = fhAnnouncements.find(function(x) { return String(x.id) === String(id); });
  if (!a) return;
  fhEditingAnnouncementId = a.id;
  document.getElementById('fhAnnFormTitle').textContent = 'Edit Announcement';
  document.getElementById('fhAnnTitle').value = a.title || '';
  document.getElementById('fhAnnBody').value = a.body || '';
  document.getElementById('fhAnnExpires').value = a.expires_at || '';
  document.getElementById('fhAnnPriority').value = a.priority || 'none';
  document.getElementById('fhAnnHighlight').checked = !!a.highlight_priority;
  document.getElementById('fhAnnCreateBtn').style.display = 'none';
  document.getElementById('fhAnnUpdateBtn').style.display = 'inline-flex';
  document.getElementById('fhAnnCancelBtn').style.display = 'inline-flex';
}

function fhDeleteAnnouncement(id) {
  if (!confirm('Remove this announcement?')) return;
  DataService.deleteAnnouncement(id).then(function() {
    fhAnnouncements = fhAnnouncements.filter(function(a) { return String(a.id) !== String(id); });
    fhRenderAnnouncements();
    fhShowToast('Announcement removed');
  }).catch(function(err) {
    fhShowToast(fhAnnouncementError(err, 'Failed to remove announcement'));
  });
}

function fhCreateAnnouncement() {
  var payload = fhReadAnnouncementForm();
  if (!payload.title) {
    fhShowToast('Enter a title');
    return;
  }
  DataService.createAnnouncement(payload).then(function() {
    fhResetAnnouncementForm();
    fhLoadAnnouncements();
    fhShowToast('Announcement added');
  }).catch(function(err) {
    fhShowToast(fhAnnouncementError(err, 'Failed to create announcement'));
  });
}

function fhUpdateAnnouncement() {
  if (!fhEditingAnnouncementId) return;
  var payload = fhReadAnnouncementForm();
  if (!payload.title) {
    fhShowToast('Enter a title');
    return;
  }
  DataService.updateAnnouncement(fhEditingAnnouncementId, payload).then(function() {
    fhResetAnnouncementForm();
    fhLoadAnnouncements();
    fhShowToast('Announcement updated');
  }).catch(function(err) {
    fhShowToast(fhAnnouncementError(err, 'Failed to update announcement'));
  });
}

document.getElementById('fhAnnCreateBtn').addEventListener('click', fhCreateAnnouncement);
document.getElementById('fhAnnUpdateBtn').addEventListener('click', fhUpdateAnnouncement);
document.getElementById('fhAnnCancelBtn').addEventListener('click', fhResetAnnouncementForm);

fhSetAnnouncementsSchemaHint();
fhLoadAnnouncements();
</script>
<script src="fh-nav-config.js"></script>
<script src="fh-top-nav.js"></script>
</body>
</html>
